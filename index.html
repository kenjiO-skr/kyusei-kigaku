<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F7A8C4" />
  <title>きゅうせい占い</title>
  <!-- パスはすべて相対（GitHub Pages のサブパス配信前提） -->
  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" href="./assets/icon-192.png" type="image/png" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="きゅうせい" />
</head>
<body>
  <div id="app" class="app"><!-- app.js が描画 --></div>

  <!-- 用語の吹き出し（点線下線タップで表示） -->
  <div id="tooltip" class="tooltip" hidden>
    <button class="tooltip__close" data-action="close-tip" aria-label="閉じる">×</button>
    <strong id="tooltip-term" class="tooltip__term"></strong>
    <p id="tooltip-desc" class="tooltip__desc"></p>
  </div>

  <script type="module" src="./src/ui/app.js"></script>
  <script>
    // service worker 登録（相対パス＝サブパス scope）。失敗してもアプリは動作する。
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => { /* 非対応・file:// では無視 */ });
      });
    }
  </script>
</body>
</html>
